# orchestrators/flow.ux.optimize.yaml
#
# SURFACE×PRINCIPLE UX ANNEALING — the 9-stage matrix flow:
#
#   1 GROUND        cap.plan.ux-matrix — resolve the declared surfaces
#                   against the real repo + persona JTBD, and author the
#                   SURFACE×PRINCIPLE matrix as a cpm-schedulable PlanGraph
#                   (7 principle lenses per surface).
#   2 CPM PLAN      cognitive/cap.coordinate.cpm-plan — submit the graph;
#                   cpm-planner computes the schedule.
#   3 CPM EXECUTE   the CANONICAL acquire→route→execute→mark loop, mirrored
#                   from cognitive/flow.drive-program: acquire ONE ready cell
#                   (cap.coordinate.acquire-cohort), gate on the scalar
#                   `exhausted`, route on metadata.principle, run the
#                   per-principle agent leaf (review.ux.analyze.* — skills
#                   inject only into same-definition leaves, so the lenses
#                   live HERE, not in a nested cap), fold its findings into
#                   the fan-in log (cap.compose.findings-log — the V13-typed
#                   accumulator), mark complete (inline plan.mark_status,
#                   exactly as flow.drive-program marks), loop.
#   4 VERIFY        cognitive-max/cap.verify.ux-surface-findings — per-
#                   surface falsification of the fan-in against the code +
#                   JTBD spine; code computes verified/dropped/above-bar.
#   5 FMECA GATE    cognitive/flow.harden.fmeca-converge — the reusable
#                   converge/mitigate/escalate loop (the same shape
#                   flow.ui.optimal inlines as design_qa/design_qa_gate/
#                   design_mitigate), hardening the remediation plan.
#   6 IMPLEMENT     cognitive/cap.implement.scope-bounded — apply the
#                   hardened plan CHUNKED BY SURFACE (finding #17 ask 3):
#                   a deterministic script splits the plan into per-surface
#                   chunks; one scope-bounded implement call per chunk;
#                   per-chunk results fold into a concat accumulator and a
#                   deterministic merge re-materializes the combined
#                   implementation_result. Bounded to the declared surface
#                   paths.
#   7 RE-MEASURE    cognitive-max/cap.run.ux-simulation — re-run the Preveti
#                   UX study (wraps scripts-library/run.preveti.ux-study).
#   8 CONVERGE      bounded anneal: converged when a round's verify finds
#                   ZERO findings above the bar, OR the round counter hits
#                   max_rounds; otherwise loop back to CPM PLAN (re-enter
#                   ANALYSIS on the patched code — never re-discovery).
#   9 PR            cognitive/cap.coordinate.pr-open — exactly one PR.
#
# Blackboard discipline: all data flows through $.context slots declared
# below. The anneal round counter is seeded via initialContext (input
# defaults do NOT reliably seed $.context — see flow.ui.optimal's
# fmeca_round note) and incremented declaratively ({ add: [...] }).
# V13 notes: the fan-in accumulator is a STRING folded by
# cap.compose.findings-log (a transition `output:` write is not a slot-table
# entry, so the fold must be cap-typed); the matrix graph likewise comes out
# of cap.plan.ux-matrix, not an in-flow agent write.
#
# Requires: connections cpm-planner, fmeca-mcp, science, github-mcp; the
# base repo (cognitive/*) and this repo (cognitive-max/*) both loaded;
# PREVETI_API_KEY in the gateway env for stage 7.

workflows:
  flow.ux.optimize:
    lifecycle: experimental
    tags: [ux, jtbd, optimization, anneal, fmeca, cognitive-science, governed]
    aliases: [ux-anneal, ux-optimize, matrix-fanout]
    description: >
      Surface×principle UX annealing: ground the declared surfaces in the
      repo + persona JTBD, fan a 7-principle cognitive-science analysis
      matrix through the CPM driver loop, falsify every finding against the
      code and the JTBD spine, harden the above-bar remediation plan through
      the FMECA convergence gate, implement scope-bounded fixes, re-measure
      with a Preveti UX study, and anneal (bounded rounds) until no finding
      clears the criticality bar — then open exactly one PR.

    inputs:
      # Surface ids: repo-relative UI paths / route ids. They double as the
      # scope bound for stage 6 (cap.implement.scope-bounded.scope_paths) —
      # fixes may only touch the surfaces that were analyzed.
      surfaces:          { type: array,  required: true }
      # { id, mental_model, jtbd_spine[], ancillary_journeys[] } — anchors
      # every lens and the falsification pass.
      persona:           { type: object, required: true }
      # Path to the Preveti study-request JSON for stage 7 (the REAL
      # contract of run.preveti.ux-study: a request file + env, not inline
      # surfaces/persona).
      study_request_path: { type: string, required: true }
      max_rounds:        { type: integer, default: 3 }
      criticality_bar:   { type: string,  default: "high" }
      # cpm-planner lock-holder identity (distinct per parallel driver).
      caller_id:         { type: string,  default: "flow-ux-optimize-driver" }

    # Terminal context slots a nesting parent reads via use.outputs.
    outputs:
      anneal_rounds_completed: { type: integer }
      findings_above_bar:      { type: array }
      fmeca_ready:             { type: boolean }
      pr_url:                  { type: string }
      residual_findings:       { type: array }
      verified_findings_total: { type: integer }

    blackboard:
      surfaces:                {}
      persona:                 {}
      study_request_path:      { type: string }
      max_rounds:              {}
      criticality_bar:         { type: string }
      caller_id:               { type: string }
      grounded_surfaces:       {}
      matrix_graph:            {}
      cell_count:              {}
      plan_id:                 { type: string }
      schedule:                {}
      cell_exhausted:          {}
      next_cell:               {}
      next_cell_id:            {}
      raw_findings_log:        { type: string }
      cells_analyzed:          {}
      round_cells_analyzed:    {}
      mark_result:             {}
      mark_failed_result:      {}
      verified_findings:       {}
      dropped_findings:        {}
      findings_above_bar:      {}
      residual_findings:       {}
      verified_findings_total: {}
      above_bar_count:         {}
      remediation_plan:        {}
      verify_report:           {}
      hardened_plan:           {}
      fmeca_ready:             {}
      fmeca_risk_ranking:      {}
      impl_chunks:             {}
      impl_chunk_count:        {}
      impl_index:              {}
      impl_log:                { type: string }
      current_impl_chunk:      {}
      last_impl_result:        {}
      implementation_result:   {}
      remeasure_passed:        {}
      remeasure_status:        {}
      remeasure_result:        {}
      anneal_rounds_completed: {}
      status_complete:         {}
      status_unroutable:       {}
      pr_body:                 { type: string }
      pr_url:                  {}
      pr_number:               {}

    # Counters + accumulators MUST seed here (input defaults don't reliably
    # seed $.context — flow.ui.optimal's fmeca_round lesson). status_* are
    # the internally-tagged objects plan.mark_status expects verbatim (a
    # `map:` binding can't build an object literal — flow.drive-program's
    # identical pattern). fmeca_ready seeds true: a round with zero above-bar
    # findings never runs the FMECA gate, and "nothing to harden" is
    # trivially converged. The declared flow outputs seed empty/null so a
    # path that halts before writing them still satisfies V24 honestly
    # (pr_url stays null until stage 9 — the outcome check keys on that).
    initialContext:
      anneal_rounds_completed: 0
      cells_analyzed: 0
      round_cells_analyzed: 0
      raw_findings_log: ""
      impl_index: 0
      impl_log: ""
      fmeca_ready: true
      findings_above_bar: []
      residual_findings: []
      verified_findings_total: 0
      pr_url: null
      status_complete:   { status: complete }
      status_unroutable: { status: failed, reason: "unroutable cell: metadata.principle is not one of hick|fitts|miller|cognitive-load|nielsen|gestalt|jtbd-friction" }

    # Orchestrate-drivable (ADR-0009): a checked outcome + an
    # `outcome: success` terminal for the driver to steer toward.
    outcomes:
      - id: annealed_pr_opened
        statement: >
          The anneal converged (or exhausted its round budget) and a single
          PR with the verified, FMECA-hardened UX fixes was opened.
        check: "$.context.pr_url != null"

    initialState: seeding

    states:

      # Seed guard-read configuration into context (a guard needs a
      # reachable context writer, not an input — flow.drive-program's
      # seeding rationale).
      seeding:
        goal: Seed guard-read configuration into context.
        transitions:
          seed:
            target: grounding
            actor: deterministic
            executor: { kind: noop }
            output:
              max_rounds:      "$.workflow.input.max_rounds"
              criticality_bar: "$.workflow.input.criticality_bar"
              caller_id:       "$.workflow.input.caller_id"

      # ── STAGE 1: GROUND ──────────────────────────────────────────────────
      # Discovery is BYPASSED by contract: surfaces are explicitly supplied
      # (flow.ux.discovery's real contract is {brief, session_id} → an
      # elicitation-gated spec with no declared outputs:, so it is neither
      # needed nor consumable here). Grounding instead resolves each declared
      # surface against the real repo + persona JTBD and authors the matrix.
      grounding:
        goal: Ground the declared surfaces in the repo + persona; author the matrix graph.
        transitions:
          ground:
            target: cpm_planning
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.plan.ux-matrix
              use:
                inputs:
                  surfaces: "$.context.surfaces"
                  persona:  "$.context.persona"
                outputs:
                  "$.context.matrix_graph":      graph
                  "$.context.grounded_surfaces": grounded_surfaces
                  "$.context.cell_count":        cell_count

      # ── STAGE 2: CPM PLAN ────────────────────────────────────────────────
      # Re-entered by the anneal loop: each round resubmits the SAME matrix
      # graph as a fresh plan (a drained plan cannot be re-acquired) — the
      # loop re-enters ANALYSIS here, never re-discovery.
      cpm_planning:
        goal: Submit the matrix graph to cpm-planner; capture plan_id + schedule.
        transitions:
          schedule:
            target: acquiring
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.coordinate.cpm-plan
              use:
                inputs:
                  graph: "$.context.matrix_graph"
                outputs:
                  "$.context.plan_id":  plan_id
                  "$.context.schedule": schedule

      # ── STAGE 3: CPM EXECUTE (acquire → route → analyze → mark → loop) ──
      acquiring:
        goal: Acquire the next ready matrix cell from cpm-planner (or detect exhaustion).
        transitions:
          acquire:
            target: cell_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.coordinate.acquire-cohort
              use:
                inputs:
                  plan_id:   "$.context.plan_id"
                  caller_id: "$.context.caller_id"
                outputs:
                  "$.context.cell_exhausted": exhausted
                  "$.context.next_cell":      spec
                  "$.context.next_cell_id":   deliverable_id

      # BRANCH on the scalar exhaustion flag; an out-of-domain flag halts
      # loudly (V23) rather than silently finishing or dead-stalling.
      # Exhaustion is only a legitimate fan-in when THIS round consumed at
      # least one cell — exhausted-on-arrival means the cohort was already
      # spent when the round began (the finding #17 wiring bug: a reused
      # plan), and converging on it would verify an empty log. Halt loudly.
      cell_gate:
        transitions:
          fan_in:
            target: verifying
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.cell_exhausted == true" }
              - { kind: expr, expr: "$.context.round_cells_analyzed >= 1" }
          exhausted_on_arrival:
            target: halted
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.cell_exhausted == true" }
              - { kind: expr, expr: "$.context.round_cells_analyzed == 0" }
          route_cell:
            target: principle_gate
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.cell_exhausted == false" }
          unexpected_flag:
            target: halted
            actor: deterministic

      # THE ROUTER — mutually exclusive over the cell's principle token
      # (guaranteed present + in-enum by cap.plan.ux-matrix's inputSchema —
      # the producing gate, not this guard, enforces the shape). Default
      # (V23): mark the cell failed and keep draining, never mis-route.
      principle_gate:
        transitions:
          to_hick:
            target: analyzing_hick
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'hick'" } ]
          to_fitts:
            target: analyzing_fitts
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'fitts'" } ]
          to_miller:
            target: analyzing_miller
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'miller'" } ]
          to_cognitive_load:
            target: analyzing_cognitive_load
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'cognitive-load'" } ]
          to_nielsen:
            target: analyzing_nielsen
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'nielsen'" } ]
          to_gestalt:
            target: analyzing_gestalt
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'gestalt'" } ]
          to_jtbd_friction:
            target: analyzing_jtbd_friction
            actor: deterministic
            guards: [ { kind: expr, expr: "$.context.next_cell.principle == 'jtbd-friction'" } ]
          unroutable:
            target: marking_unroutable
            actor: deterministic

      # Per-principle ANALYSIS leaves (one state per lens — praxec's YAML
      # loader takes no merge keys, so the 7 are written out). Each state
      # loads its dedicated cognitive-max lens skill (skills inject into
      # same-definition agent leaves only — this is where the 7 skills RUN).
      # The agent's submitted findings go STRAIGHT into the typed fan-in
      # fold: the transition's executor is cap.compose.findings-log reading
      # `$.arguments.findings` (arguments bypass the slot table; the fold's
      # output types raw_findings_log for the verify stage). The submission
      # schema is the skills' shared structured contract — the producing
      # gate. Goal text is shared; the loaded skill differentiates the lens.
      analyzing_hick:
        goal: >
          Analyze ONE matrix cell. Read $.context.next_cell — `surface` (the
          grounded surface object: id, paths, entry, notes) and `principle`
          (your lens token) — and $.context.persona (id, mental_model,
          jtbd_spine, ancillary_journeys). Apply ONLY your loaded
          review.ux.analyze.* lens to ONLY this surface, walking the
          persona's JTBD spine, reading the surface's real files in this
          repo. Submit `findings` per the skill's structured contract —
          every finding cites surface + element (file:line when localized) +
          mechanism + the concrete cost at a named jtbd_step; generic
          best-practice with no user cost is dropped; an empty array is a
          legal, honest result.
        skills: [review.ux.analyze.hicks]
        transitions:
          analyze:
            target: marking
            actor: agent
            inputSchema:
              type: object
              required: [findings]
              properties:
                findings:
                  type: array
                  items:
                    type: object
                    required: [surface, principle, element, mechanism, jtbd_step, user_cost, evidence, suggested_fix, severity_hint]
                    properties:
                      surface:       { type: string }
                      principle:     { type: string, enum: [hick, fitts, miller, cognitive-load, nielsen, gestalt, jtbd-friction] }
                      element:       { type: string }
                      file:          { type: string }
                      line:          { type: integer }
                      mechanism:     { type: string }
                      jtbd_step:     { type: string }
                      user_cost:     { type: string, enum: [extra-decisions, missed-target, lost-place, wrong-model, overload, stalled-journey] }
                      evidence:      { type: string }
                      suggested_fix: { type: string }
                      severity_hint: { type: string, enum: [low, medium, high] }
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.compose.findings-log
              use:
                inputs:
                  log:      "$.context.raw_findings_log"
                  findings: "$.arguments.findings"
                outputs:
                  "$.context.raw_findings_log": log

