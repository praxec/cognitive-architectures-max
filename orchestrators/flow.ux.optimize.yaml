                      line:          { type: integer }
                      mechanism:     { type: string }
                      jtbd_step:     { type: string }
                      user_cost:     { type: string, enum: [extra-decisions, missed-target, lost-place, wrong-model, overload, stalled-journey] }
                      evidence:      { type: string }
                      suggested_fix: { type: string }
                      severity_hint: { type: string, enum: [low, medium, high] }
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.compose.findings-log
              use:
                inputs:
                  log:      "$.context.raw_findings_log"
                  findings: "$.arguments.findings"
                outputs:
                  "$.context.raw_findings_log": log

      analyzing_jtbd_friction:
        goal: >
          Analyze ONE matrix cell. Read $.context.next_cell — `surface` (the
          grounded surface object: id, paths, entry, notes) and `principle`
          (your lens token) — and $.context.persona (id, mental_model,
          jtbd_spine, ancillary_journeys). Apply ONLY your loaded
          review.ux.analyze.* lens to ONLY this surface, walking the
          persona's JTBD spine, reading the surface's real files in this
          repo. Submit `findings` per the skill's structured contract —
          every finding cites surface + element (file:line when localized) +
          mechanism + the concrete cost at a named jtbd_step; generic
          best-practice with no user cost is dropped; an empty array is a
          legal, honest result.
        skills: [review.ux.analyze.jtbd-friction]
        transitions:
          analyze:
            target: marking
            actor: agent
            inputSchema:
              type: object
              required: [findings]
              properties:
                findings:
                  type: array
                  items:
                    type: object
                    required: [surface, principle, element, mechanism, jtbd_step, user_cost, evidence, suggested_fix, severity_hint]
                    properties:
                      surface:       { type: string }
                      principle:     { type: string, enum: [hick, fitts, miller, cognitive-load, nielsen, gestalt, jtbd-friction] }
                      element:       { type: string }
                      file:          { type: string }
                      line:          { type: integer }
                      mechanism:     { type: string }
                      jtbd_step:     { type: string }
                      user_cost:     { type: string, enum: [extra-decisions, missed-target, lost-place, wrong-model, overload, stalled-journey] }
                      evidence:      { type: string }
                      suggested_fix: { type: string }
                      severity_hint: { type: string, enum: [low, medium, high] }
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.compose.findings-log
              use:
                inputs:
                  log:      "$.context.raw_findings_log"
                  findings: "$.arguments.findings"
                outputs:
                  "$.context.raw_findings_log": log

      # Record the analyzed cell in the durable tracker (CAS + lock
      # enforced by cpm-planner) then LOOP — inline `kind: mcp` exactly as
      # flow.drive-program marks (a cap-typed mark would need the status
      # object through slot-checked use.inputs; `map:` binds it by path).
      marking:
        goal: Mark the analyzed cell complete in cpm-planner; loop to acquire.
        transitions:
          mark:
            target: acquiring
            actor: deterministic
            executor:
              kind: mcp
              connection: cpm-planner
              tool: plan.mark_status
              map:
                plan_id:        "$.context.plan_id"
                deliverable_id: "$.context.next_cell_id"
                caller_id:      "$.context.caller_id"
                status:         "$.context.status_complete"
            output:
              mark_result: "$.output"
              cells_analyzed: { add: ["$.context.cells_analyzed", 1] }
              round_cells_analyzed: { add: ["$.context.round_cells_analyzed", 1] }

      # Unroutable cell: mark FAILED (reason preserved, lock released) and
      # keep draining — fail-fast per cell, never a dead-stall (V23).
      marking_unroutable:
        goal: Record the unroutable cell as failed; keep driving the matrix.
        transitions:
          mark_failed:
            target: acquiring
            actor: deterministic
            executor:
              kind: mcp
              connection: cpm-planner
              tool: plan.mark_status
              map:
                plan_id:        "$.context.plan_id"
                deliverable_id: "$.context.next_cell_id"
                caller_id:      "$.context.caller_id"
                status:         "$.context.status_unroutable"
            output:
              mark_failed_result: "$.output"
              round_cells_analyzed: { add: ["$.context.round_cells_analyzed", 1] }

      # ── STAGE 4: VERIFY (falsification fan-in) ───────────────────────────
      verifying:
        goal: Falsify every fan-in finding against the code + JTBD spine; partition.
        transitions:
          verify:
            target: convergence_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.verify.ux-surface-findings
              use:
                inputs:
                  raw_findings:    "$.context.raw_findings_log"
                  persona:         "$.context.persona"
                  surfaces:        "$.context.grounded_surfaces"
                  criticality_bar: "$.context.criticality_bar"
                outputs:
                  "$.context.verified_findings":       verified_findings
                  "$.context.dropped_findings":        dropped_findings
                  "$.context.findings_above_bar":      findings_above_bar
                  "$.context.residual_findings":       residual_findings
                  "$.context.verified_findings_total": verified_findings_total
                  "$.context.above_bar_count":         above_bar_count
                  "$.context.remediation_plan":        remediation_plan
                  "$.context.verify_report":           report

      # ── STAGE 8a: CONVERGENCE CHECK (per-round, code-computed count) ─────
      # Converged-clean: this round's verified analysis produced ZERO
      # findings above the bar — the anneal's fixed point. Every edge
      # increments the round counter (a round = one full analysis+verify
      # pass). Default (V23): a non-numeric count is a wire-shape bug — halt
      # loudly, never spin.
      convergence_gate:
        transitions:
          converged:
            target: composing_pr_body
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.above_bar_count == 0" }
            output:
              anneal_rounds_completed: { add: ["$.context.anneal_rounds_completed", 1] }
          harden:
            target: hardening
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.above_bar_count >= 1" }
            output:
              anneal_rounds_completed: { add: ["$.context.anneal_rounds_completed", 1] }
          unexpected_count:
            target: halted
            actor: deterministic

      # ── STAGE 5: FMECA GATE (converge/mitigate/escalate, reused) ─────────
      # The exact convergence shape flow.ui.optimal inlines, reused as the
      # nestable sub-flow: FMECA → poka-yoke/TRIZ mitigation → re-FMECA
      # until residual risk is Low, bounded, escalating to the human
      # signoff on exhaustion (never silent).
      hardening:
        goal: Harden the above-bar remediation plan through the FMECA convergence loop.
        transitions:
          harden:
            target: impl_chunking
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/flow.harden.fmeca-converge
              use:
                inputs:
                  subject:         "$.context.remediation_plan"
                  subject_kind:    "plan"
                  matrix_strategy: "qualitative3x3"
                  check_codebase:  false
                outputs:
                  "$.context.hardened_plan":      artifact
                  "$.context.fmeca_ready":        fmeca_ready
                  "$.context.fmeca_risk_ranking": risk_ranking

      # ── STAGE 6: IMPLEMENT (scope-bounded, chunked by surface) ───────────
      # Finding #17 ask 3: ONE cap.implement.scope-bounded call per SURFACE
      # chunk of the hardened plan, never all 37 findings in one agent
      # invocation (which shipped 2/37 and self-reported success). A
      # deterministic script splits the plan; the chunk loop mirrors the
      # cap's batch loop (prep → implement → record → gate); per-chunk
      # results fold into the impl_log concat accumulator and a
      # deterministic merge re-materializes implementation_result.
      # Real per-call contract: {plan, scope_paths} → {result}. The declared
      # surfaces ARE the scope bound — fixes may only touch what was
      # analyzed.
      # Cap-typed (V13): impl_chunks feeds impl_prep's use.inputs, so the
      # chunks must come out of a snippet-typed capability output — the same
      # rationale as cap.compose.findings-log. The chunk cursor +
      # accumulator seed in initialContext (round 1) and reset on
      # round_gate.next_round (round 2+).
      impl_chunking:
        goal: Split the hardened plan into per-surface implementation chunks.
        transitions:
          chunk:
            target: impl_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.run.ux-plan-chunk
              use:
                inputs:
                  plan: "$.context.hardened_plan"
                outputs:
                  "$.context.impl_chunks":      chunks
                  "$.context.impl_chunk_count": chunk_count

      # CHUNK LOOP GATE — mutually exclusive over the chunk cursor.
      # Default (V23): an out-of-domain cursor/count is a wire-shape bug —
      # halt loudly, never spin.
      impl_gate:
        transitions:
          next_chunk:
            target: impl_prep
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.impl_index < $.context.impl_chunk_count" }
          all_chunked:
            target: impl_merging
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.impl_index >= $.context.impl_chunk_count" }
          unexpected_cursor:
            target: halted
            actor: deterministic

      # Deterministic: select impl_chunks[impl_index] for the next call.
      # Cap-typed (V13) for the same reason as impl_chunking: the selected
      # chunk feeds implementing's use.inputs. The cap also returns the
      # advanced cursor (next_index) — binding it back to impl_index is what
      # makes the cursor itself a slot-table entry this cap's own use.inputs
      # may read; at runtime the initial 0 comes from initialContext /
      # the round reset.
      impl_prep:
        goal: Select the current per-surface chunk for the next implement call.
        transitions:
          slice:
            target: implementing
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.run.ux-chunk-slice
              use:
                inputs:
                  chunks: "$.context.impl_chunks"
                  index:  "$.context.impl_index"
                outputs:
                  "$.context.current_impl_chunk": chunk
                  "$.context.impl_index":         next_index

      # One scope-bounded implement call for the CURRENT chunk only. The
      # result lands in a scratch slot (use.outputs is a plain slot capture;
      # no repo precedent combines it with output: operators on the same
      # transition) — the next state folds it into the accumulator.
      implementing:
        goal: Apply the current per-surface chunk of the hardened plan, bounded to the analyzed surfaces.
        transitions:
          implement:
            target: impl_record
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.implement.scope-bounded
              use:
                inputs:
                  plan:        "$.context.current_impl_chunk"
                  scope_paths: "$.context.surfaces"
                outputs:
                  "$.context.last_impl_result": result

      # Fold the chunk result into the impl_log accumulator (noop + output
      # operators — the seeding state's and cap.compose.findings-log's exact
      # pattern), then loop to the gate. The cursor already advanced in
      # impl_prep (the cap's next_index write-back).
      impl_record:
        goal: Fold the chunk result into the implementation log; loop to the gate.
        transitions:
          record:
            target: impl_gate
            actor: deterministic
            executor: { kind: noop }
            output:
              impl_log:
                concat:
                  - "$.context.impl_log"
                  - "$.context.last_impl_result"
                  - "\n"

      # Deterministic: re-materialize the per-chunk result stream into the
      # combined implementation_result the audit trail + PR ride on.
      impl_merging:
        goal: Merge the per-chunk implement results into one implementation result.
        transitions:
          merge:
            target: remeasuring
            actor: deterministic
            executor:
              kind: script
              subject: run.ux-impl-merge
              args:
                - "$.context.impl_log"
            output:
              implementation_result: "$.output.json.result"

      # ── STAGE 7: RE-MEASURE (Preveti UX study) ───────────────────────────
      # Real contract: a study-request JSON path (+ PREVETI_* env), wrapped
      # by cap.run.ux-simulation. The measurement is advisory to the anneal
      # (the convergence signal is the NEXT round's code-computed above-bar
      # count); passed/status/result ride to the audit trail + PR.
      remeasuring:
        goal: Re-run the Preveti UX study against the patched surfaces.
        transitions:
          remeasure:
            target: round_gate
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.run.ux-simulation
              use:
                inputs:
                  request_path: "$.context.study_request_path"
                outputs:
                  "$.context.remeasure_passed": passed
                  "$.context.remeasure_status": status
                  "$.context.remeasure_result": result

      # ── STAGE 8b: ROUND BOUND (LoopGuard) ────────────────────────────────
      # Loop back to ANALYSIS (stage 2 — same matrix, fresh plan, patched
      # code; the fan-in log resets) while rounds remain; at the bound,
      # force-converge to the PR with whatever was implemented — the
      # residual above-bar findings are reported, never silently dropped.
      # Default (V23): an out-of-domain counter ends the anneal, never spins.
      round_gate:
        transitions:
          next_round:
            target: resalting
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.anneal_rounds_completed < $.context.max_rounds" }
            output:
              raw_findings_log: { set: "" }
              round_cells_analyzed: { set: 0 }
              impl_index: { set: 0 }
              impl_log: { set: "" }
          force_converge:
            target: composing_pr_body
            actor: deterministic
            guards:
              - { kind: expr, expr: "$.context.anneal_rounds_completed >= $.context.max_rounds" }
          unexpected_round:
            target: composing_pr_body
            actor: deterministic

      # ── STAGE 8c: ROUND RE-SALT (finding #17) ────────────────────────────
      # plan.submit is idempotent on the graph hash, so looping back with a
      # byte-identical graph re-fetches the SPENT round-1 plan and the round
      # measures nothing. Re-expand the same surfaces with the round number
      # stamped into deliverable metadata — a distinct hash per round → a
      # fresh 56-cell cohort per round. Deterministic: same expansion script
      # the planner gate uses, so cell_count can never disagree.
      resalting:
        goal: Re-expand the matrix with the round stamp so cpm-plan mints a fresh cohort.
        transitions:
          resalt:
            target: cpm_planning
            actor: deterministic
            executor:
              kind: script
              subject: run.ux-matrix-expand
              args:
                - "$.context.grounded_surfaces"
                - "$.context.anneal_rounds_completed"
            output:
              matrix_graph: "$.output.json.graph"
              cell_count:   "$.output.json.cell_count"

      # ── STAGE 9: ONE PR ──────────────────────────────────────────────────
      # Render the PR body as a typed string slot (the same compose fold —
      # pr-open's real contract takes title/body STRINGS), then open exactly
      # one PR. Residual detail beyond the body rides in the audit trail.
      composing_pr_body:
        goal: Render the above-bar findings into the PR body string.
        transitions:
          render:
            target: opening_pr
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive-max/cap.compose.findings-log
              use:
                inputs:
                  log: "UX anneal (flow.ux.optimize): surface×principle matrix analysis -> falsification -> FMECA-hardened, scope-bounded fixes -> Preveti re-measure. Findings above the criticality bar this final round (empty = converged clean):"
                  findings: "$.context.findings_above_bar"
                outputs:
                  "$.context.pr_body": log

      opening_pr:
        goal: Open exactly one PR for the annealed UX fixes.
        transitions:
          open:
            target: done
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cognitive/cap.coordinate.pr-open
              use:
                inputs:
                  title: "feat(ux): annealed surface-x-principle UX fixes (flow.ux.optimize)"
                  body:  "$.context.pr_body"
                  base:  "main"
                outputs:
                  "$.context.pr_url":    url
                  "$.context.pr_number": pr_number

      done:
        terminal: true
        outcome: success

      # Loud stop for a broken wire shape (out-of-domain exhausted flag /
      # non-numeric above-bar count). Never a silent finish.
      halted:
        terminal: true
        outcome: failure
