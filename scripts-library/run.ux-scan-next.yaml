version: "1.0.0"
scripts:
  run.ux-scan-next:
    verb: run
    lifecycle: experimental
    source: cognitive-architectures-max
    body: |
      #!/usr/bin/env python3
      # Deterministic queue-pop for cap.review.ux-matrix-scan's per-surface
      # loop — the connection-free analogue of the cell loop's acquire step
      # in flow.ux.optimize (cap.coordinate.acquire-cohort): pop ONE ready
      # item, or report exhaustion as a scalar flag the gate branches on.
      #
      # Arg $1 = queue (JSON array of grounded surface objects).
      # Arg $2 = index (integer cursor, 0-based).
      # Stdout: {"exhausted": true,  "surface": null,       "next_index": i} or
      #         {"exhausted": false, "surface": queue[i],   "next_index": i+1}
      # Fail-closed: malformed input exits non-zero with a reason.
      import json, sys

      def die(msg):
          print(json.dumps({"error": msg}), file=sys.stderr)
          sys.exit(1)

      raw_queue = sys.argv[1] if len(sys.argv) > 1 else ""
      raw_index = sys.argv[2] if len(sys.argv) > 2 else ""
      try:
          queue = json.loads(raw_queue)
      except ValueError as e:
          die(f"queue is not valid JSON: {e}")
      if not isinstance(queue, list) or not queue:
          die("queue must be a non-empty JSON array")
      try:
          index = int(json.loads(raw_index))
      except (ValueError, TypeError) as e:
          die(f"index is not an integer: {e}")
      if index < 0:
          die("index must be >= 0")

      if index >= len(queue):
          print(json.dumps({"exhausted": True, "surface": None,
                            "next_index": index}))
      else:
          print(json.dumps({"exhausted": False, "surface": queue[index],
                            "next_index": index + 1}))
