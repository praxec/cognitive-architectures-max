version: "1.0.0"
scripts:
  run.ux-matrix-expand:
    verb: run
    lifecycle: experimental
    source: cognitive-architectures-max
    body: |
      #!/usr/bin/env python3
      # Deterministic SURFACE×PRINCIPLE matrix expansion for cap.plan.ux-matrix.
      #
      # WHY THIS EXISTS (live finding, 2026-07-22 run wf_de8c3c36): the original
      # cap asked ONE agent emission for the full 56-deliverable graph — with the
      # grounded-surface object repeated inside every cell — and the generation
      # ran past the 60s per-model-call cap on every attempt. The graph is a pure
      # cross product of grounded_surfaces × the 7 fixed principle tokens: there
      # is nothing for a model to decide. The agent now grounds surfaces ONLY
      # (small output); this script expands the matrix, so cell_count can never
      # disagree with the graph and the emission cost is O(1) model tokens.
      #
      # Arg $1 = grounded_surfaces (JSON array of {id, paths?, entry?, notes?}).
      # Arg $2 (optional) = anneal round number. When present and > 0, every
      #   deliverable is stamped metadata.anneal_round = N. plan.submit is
      #   idempotent on the graph hash ("identical graphs return the same
      #   plan_id" — cpm-planner), so WITHOUT the stamp an anneal loop-back
      #   resubmits a byte-identical graph, gets the round-1 plan whose
      #   deliverables are all complete, exhausts acquisition on arrival, and
      #   "converges" on an empty findings log (live finding #17). The stamp
      #   makes each round's graph distinct → a fresh cohort per round.
      # Stdout: {"graph": {"deliverables": [...]}, "cell_count": N}
      # Fail-closed: malformed input or empty array exits non-zero with a reason.
      import json, sys

      PRINCIPLES = ["hick", "fitts", "miller", "cognitive-load",
                    "nielsen", "gestalt", "jtbd-friction"]

      def die(msg):
          print(json.dumps({"error": msg}), file=sys.stderr)
          sys.exit(1)

      raw = sys.argv[1] if len(sys.argv) > 1 else ""
      try:
          surfaces = json.loads(raw)
      except ValueError as e:
          die(f"grounded_surfaces is not valid JSON: {e}")
      if not isinstance(surfaces, list) or not surfaces:
          die("grounded_surfaces must be a non-empty JSON array")

      # Optional round stamp (see header). Absent/0 → byte-identical to the
      # pre-round behavior, so first-pass graphs and their hashes are unchanged.
      anneal_round = 0
      if len(sys.argv) > 2 and str(sys.argv[2]).strip():
          try:
              anneal_round = int(str(sys.argv[2]).strip())
          except ValueError:
              die(f"anneal round (arg 2) must be an integer: {sys.argv[2]!r}")

      deliverables = []
      for s in surfaces:
          if not isinstance(s, dict) or not s.get("id"):
              die(f"surface without an id: {json.dumps(s)[:120]}")
          sid = s["id"]
          for p in PRINCIPLES:
              metadata = {"surface": s, "principle": p}
              if anneal_round > 0:
                  metadata["anneal_round"] = anneal_round
              deliverables.append({
                  "id": f"{sid}__{p}",
                  "owned_files": [f"{sid}::{p}"],
                  "prerequisites": [],
                  "metadata": metadata,
              })

      ids = [d["id"] for d in deliverables]
      if len(ids) != len(set(ids)):
          die("duplicate cell ids — surface ids must be unique")

      print(json.dumps({
          "graph": {"deliverables": deliverables},
          "cell_count": len(deliverables),
      }))
