version: "1.0.0"
scripts:
  verify.ux.findings-partition:
    verb: verify
    lifecycle: experimental
    source: cognitive-architectures-max
    body: |
      #!/usr/bin/env python3
      # Deterministic partition step for cognitive-max/cap.verify.ux-surface-findings.
      #
      # CODE computes the partition; the LLM only supplied per-finding
      # falsification observations (supports=true means the finding SURVIVED
      # the falsification attempt). Fail-closed: a candidate with no
      # adjudicated observation is DROPPED, never silently verified.
      #
      # Args:
      #   $1 = candidates JSON array (verify.ux.findings-normalize output,
      #        each with finding_id + severity_hint; may arrive via the
      #        finding-#15 spill contract — read with arg())
      #   $2 = cases JSON array ({use_case_id|finding_id, supports, evidence,
      #        rationale} — the merged falsification observations)
      #   $3 = criticality_bar ("high" | "medium"; anything else -> "high")
      #   $4 = persona JSON object
      #   $5 = surfaces JSON array
      # Stdout: {verified_findings, dropped_findings, findings_above_bar,
      #          residual_findings, verified_findings_total, above_bar_count,
      #          remediation_plan}
      import json, os, sys

      def arg(i, default=""):
          v = sys.argv[i] if len(sys.argv) > i else default
          spilled = json.loads(os.environ.get("PRAXEC_SPILLED_ARGS", "[]"))
          if (i - 1) in spilled and isinstance(v, str) and v.startswith("@argfile:"):
              with open(v[len("@argfile:"):]) as f:
                  return f.read()
          return v

      def jarg(i, default):
          try:
              return json.loads(arg(i))
          except Exception:
              return default

      candidates = jarg(1, [])
      cases      = jarg(2, [])
      bar        = str(arg(3, "high")).strip().lower()
      if bar not in ("high", "medium"):
          bar = "high"
      persona  = jarg(4, {})
      surfaces = jarg(5, [])

      by_id = {}
      for c in cases if isinstance(cases, list) else []:
          if isinstance(c, dict):
              cid = c.get("use_case_id") or c.get("finding_id")
              if cid:
                  by_id[str(cid)] = c

      verified, dropped = [], []
      for f in candidates if isinstance(candidates, list) else []:
          if not isinstance(f, dict):
              continue
          case = by_id.get(str(f.get("finding_id")))
          if case is None:
              g = dict(f)
              g["drop_reason"] = "no adjudicated falsification observation (fail-closed)"
              dropped.append(g)
          elif case.get("supports") is True:
              verified.append(f)
          else:
              g = dict(f)
              g["drop_reason"] = case.get("evidence") or case.get("rationale") \
                  or "falsified against code / JTBD spine"
              dropped.append(g)

      allowed = ("high",) if bar == "high" else ("high", "medium")
      def sev(f):
          s = str(f.get("severity_hint", "")).strip().lower()
          return s if s in ("low", "medium", "high") else "low"

      above    = [f for f in verified if sev(f) in allowed]
      residual = [f for f in verified if sev(f) not in allowed]

      print(json.dumps({
          "verified_findings": verified,
          "dropped_findings": dropped,
          "findings_above_bar": above,
          "residual_findings": residual,
          "verified_findings_total": len(verified),
          "above_bar_count": len(above),
          "remediation_plan": {
              "kind": "ux-remediation-plan",
              "criticality_bar": bar,
              "persona": persona,
              "surfaces": surfaces,
              "findings": above,
          },
      }))
