# skills/skill.ux.analyze.jtbd-friction.yaml
#
# MAX-tier principle lens for flow.ux.optimize's SURFACE×PRINCIPLE matrix:
# JTBD friction — the spine walk itself (Gulfs of Execution/Evaluation,
# struggling moments, peak-end), split out of plan.ux-design.expert §1/§2/§4
# and deepened. Loaded on the flow's `analyzing_jtbd_friction` agent leaf.
# Shares the grounding contract + structured findings contract with its
# sibling skill.ux.analyze.* lenses.

skills:
  review.ux.analyze.jtbd-friction:
    verb: review
    lifecycle: experimental
    source: cognitive-architectures-max
    body: |
      # Lens: JTBD friction — walk the job, find where the surface fights it

      Your principle token: `jtbd-friction`. Apply ONLY this lens, to ONLY
      the surface you were handed ($.context.next_cell.surface), grounded in
      the persona ($.context.persona: id, mental_model, jtbd_spine,
      ancillary_journeys).

      ## Mechanism (in depth)

      The persona hired this surface for a job: "when [situation], I want to
      [motivation], so I can [outcome]" — with functional, emotional, and
      social dimensions. Friction is any point where the surface serves its
      own structure instead of the job's. Hunt with:
      - **Gulf of Execution** (Norman): at each named step, can the persona
        translate INTENT into an action the surface offers, in their own
        vocabulary? A step whose required action exists but is unfindable/
        unnameable is a gulf, even if "the feature exists".
      - **Gulf of Evaluation**: after acting, can the persona tell whether
        the job MOVED FORWARD? Missing/ambiguous feedback about job
        progress (not merely system status) leaves the outcome unknowable.
      - **Spine continuity**: steps forced out of the job's natural order;
        detours through configuration/upsell/unrelated structure in the
        middle of the spine; dead ends where the next step has no visible
        entry point from the previous one.
      - **Struggling moment & hiring trigger**: the entry experience must
        meet the persona mid-struggle — demanding setup/commitment before
        first value inverts the trigger (the "fire" risk is highest here).
      - **Ancillary journeys**: the secondary journeys the persona also
        runs (ancillary_journeys) must not be severed by optimizations for
        the primary spine.
      - **Peak-end**: the worst moment and the LAST moment of the walk
        dominate memory — an ugly ending (confirmation limbo, unclear
        completion) taxes the whole job's perceived quality.

      ## Grounding requirement (persona/JTBD)

      This lens IS the spine walk: traverse jtbd_spine step by step on the
      actual surface, then each ancillary journey. Every finding names the
      exact step where the job stalls, detours, or goes dark, in the
      persona's situation — not an abstract "user".

      ## Anti-false-positive guardrail

      Every finding MUST cite: the surface id, the concrete element (and
      file:line when you can localize the source), the named mechanism, and
      the CONCRETE cost at a NAMED jtbd step (what the job loses: time,
      certainty, progress, trust). "Could be smoother" with no stalled or
      misdirected step is a false positive — DROP it. An empty findings
      array is a legal, honest result. Never score criticality —
      severity_hint is advisory only.

      ## Output contract (STRUCTURED)

      Submit `findings`: an array of objects, each with EXACTLY this core:
        { surface, principle: "jtbd-friction", element, mechanism,
          jtbd_step, user_cost, evidence, suggested_fix, severity_hint }
      - `surface`       — the surface id you were handed.
      - `element`       — the concrete UI element (label/selector), plus
                          optional `file`/`line` when localized.
      - `mechanism`     — the named mechanism ("Gulf of Evaluation: submit
                          returns to the list with no signal the claim was
                          filed").
      - `jtbd_step`     — the named spine/journey step id.
      - `user_cost`     — the concrete cost class narrated at that step
                          (extra-decisions | missed-target | lost-place |
                          wrong-model | overload | stalled-journey);
                          usually stalled-journey here.
      - `evidence`      — the render/code citation backing it; never invent
                          an element.
      - `suggested_fix` — the smallest behavior-preserving change removing
                          the violation.
      - `severity_hint` — low | medium | high (advisory; the FMECA gate
                          computes real criticality).
      When a host capability supplies its own submission schema, keep these
      as the semantic core and also map mechanism→root_cause and
      suggested_fix→remediation.
