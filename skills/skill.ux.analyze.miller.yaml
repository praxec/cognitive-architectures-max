# skills/skill.ux.analyze.miller.yaml
#
# MAX-tier principle lens for flow.ux.optimize's SURFACE×PRINCIPLE matrix:
# working-memory limits & chunking (Miller), split out of
# plan.ux-design.expert §2/§4 and deepened. Loaded on the flow's
# `analyzing_miller` agent leaf. Shares the grounding contract + structured
# findings contract with its sibling skill.ux.analyze.* lenses.

skills:
  review.ux.analyze.miller:
    verb: review
    lifecycle: experimental
    source: cognitive-architectures-max
    body: |
      # Lens: Working-memory limits & chunking (Miller)

      Your principle token: `miller`. Apply ONLY this lens, to ONLY the
      surface you were handed ($.context.next_cell.surface), grounded in the
      persona ($.context.persona: id, mental_model, jtbd_spine,
      ancillary_journeys).

      ## Mechanism (in depth)

      Working memory holds ~4±1 CHUNKS (modern estimate; Miller's 7±2 is the
      upper bound for practiced material). A chunk is a unit MEANINGFUL to
      this persona's mental model — expertise moves the boundary, the UI
      cannot. Hunt with:
      - **Carried state**: anything the persona must HOLD across a
        navigation, scroll, tab switch, or dialog to complete the current
        JTBD step (a code from one screen typed into another; comparing
        items that never render side-by-side; a wizard demanding recall of
        step-1 answers at step 4).
      - **Recognition over recall**: inputs that demand recalled identifiers
        where the UI could offer recognition (pickers, recents, defaults,
        visible context) push storage onto the persona.
      - **Unchunked displays**: undifferentiated runs of digits/options/
        fields that exceed the chunk budget without grouping, headers, or
        progressive summarization.
      - **Memory offloading**: the UI should be the external memory —
        breadcrumbs, persistent selections, visible carts/baskets, sticky
        summaries. Their absence at a multi-part step is a defect; their
        presence is why a long list can still be fine.

      ## Grounding requirement (persona/JTBD)

      Walk the persona's jtbd_spine (and ancillary_journeys) across this
      surface and track WHAT MUST BE HELD IN THE HEAD at each named step —
      count the chunks in the persona's vocabulary, not raw elements. A
      dense display the persona scans (not holds) is not a violation.

      ## Anti-false-positive guardrail

      Every finding MUST cite: the surface id, the concrete element (and
      file:line when you can localize the source), the named mechanism, and
      the CONCRETE cost at a NAMED jtbd step ("at step s3 the persona must
      hold the plan name and two limits from the previous screen"). A generic
      "7±2 items" complaint with no held-state cost at a named step is a
      false positive — DROP it. An empty findings array is a legal, honest
      result. Never score criticality — severity_hint is advisory only.

      ## Output contract (STRUCTURED)

      Submit `findings`: an array of objects, each with EXACTLY this core:
        { surface, principle: "miller", element, mechanism, jtbd_step,
          user_cost, evidence, suggested_fix, severity_hint }
      - `surface`       — the surface id you were handed.
      - `element`       — the concrete UI element (label/selector), plus
                          optional `file`/`line` when localized.
      - `mechanism`     — the named mechanism ("Miller: 6 unchunked config
                          values carried across the wizard boundary").
      - `jtbd_step`     — the named spine/journey step id.
      - `user_cost`     — the concrete cost class narrated at that step
                          (extra-decisions | missed-target | lost-place |
                          wrong-model | overload | stalled-journey);
                          usually lost-place or overload here.
      - `evidence`      — the render/code citation backing it; never invent
                          an element.
      - `suggested_fix` — the smallest behavior-preserving change removing
                          the violation.
      - `severity_hint` — low | medium | high (advisory; the FMECA gate
                          computes real criticality).
      When a host capability supplies its own submission schema, keep these
      as the semantic core and also map mechanism→root_cause and
      suggested_fix→remediation.
