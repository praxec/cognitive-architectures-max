# skills/skill.ux.analyze.nielsen.yaml
#
# MAX-tier principle lens for flow.ux.optimize's SURFACE×PRINCIPLE matrix:
# Nielsen's 10 usability heuristics as a JTBD-grounded evaluation (from
# plan.ux-design.expert §4's heuristic pressure-test, deepened). Loaded on
# the flow's `analyzing_nielsen` agent leaf. Shares the grounding contract +
# structured findings contract with its sibling skill.ux.analyze.* lenses.

skills:
  review.ux.analyze.nielsen:
    verb: review
    lifecycle: experimental
    source: cognitive-architectures-max
    body: |
      # Lens: Nielsen's heuristics — named violations only

      Your principle token: `nielsen`. Apply ONLY this lens, to ONLY the
      surface you were handed ($.context.next_cell.surface), grounded in the
      persona ($.context.persona: id, mental_model, jtbd_spine,
      ancillary_journeys).

      ## Mechanism (in depth) — the 10, with what each predicts

      1. **Visibility of system status** — after every spine action, does
         the surface show what happened and what is happening (saving,
         saved, failed)? Silent async work is the classic violation.
      2. **Match between system and real world** — labels/order in the
         persona's mental-model vocabulary, not the schema's.
      3. **User control & freedom** — undo/cancel/exit for every
         side-effecting spine action; no one-way doors without a marked
         emergency exit.
      4. **Consistency & standards** — same action, same name, same place
         across the surface; platform conventions kept unless the persona's
         domain overrides them.
      5. **Error prevention** — constraints/confirmation/safe defaults at
         the step where the costly mistake is possible (prefer poka-yoke to
         apology).
      6. **Recognition rather than recall** — options, defaults, and
         context visible at the point of decision.
      7. **Flexibility & efficiency of use** — accelerators for the
         persona's REPEATED spine steps (bulk, keyboard, recents) that stay
         invisible to novices.
      8. **Aesthetic & minimalist design** — every element on the step's
         screen competes with the step's primary action; content irrelevant
         to any spine/journey step is noise.
      9. **Help users recognize, diagnose, recover from errors** — error
         text in the persona's language, naming the cause and the concrete
         next action, adjacent to where recovery happens.
      10. **Help & documentation** — task-oriented, searchable, at the
         point of need; needing docs for a spine step is itself signal.

      ## Grounding requirement (persona/JTBD)

      Run the heuristic evaluation WHILE walking the persona's jtbd_spine
      (and ancillary_journeys) — a heuristic violation only counts where a
      named step meets it. Name the heuristic by number+name in every
      finding's mechanism.

      ## Anti-false-positive guardrail

      Every finding MUST cite: the surface id, the concrete element (and
      file:line when you can localize the source), the numbered heuristic as
      the mechanism, and the CONCRETE cost at a NAMED jtbd step. A heuristic
      recitation with no user cost at a named step is a false positive —
      DROP it. An empty findings array is a legal, honest result. Never
      score criticality — severity_hint is advisory only.

      ## Output contract (STRUCTURED)

      Submit `findings`: an array of objects, each with EXACTLY this core:
        { surface, principle: "nielsen", element, mechanism, jtbd_step,
          user_cost, evidence, suggested_fix, severity_hint }
      - `surface`       — the surface id you were handed.
      - `element`       — the concrete UI element (label/selector), plus
                          optional `file`/`line` when localized.
      - `mechanism`     — the numbered heuristic + how it is violated
                          ("Nielsen #1 visibility: import runs 30s with no
                          progress or completion signal").
      - `jtbd_step`     — the named spine/journey step id.
      - `user_cost`     — the concrete cost class narrated at that step
                          (extra-decisions | missed-target | lost-place |
                          wrong-model | overload | stalled-journey).
      - `evidence`      — the render/code citation backing it; never invent
                          an element.
      - `suggested_fix` — the smallest behavior-preserving change removing
                          the violation.
      - `severity_hint` — low | medium | high (advisory; the FMECA gate
                          computes real criticality).
      When a host capability supplies its own submission schema, keep these
      as the semantic core and also map mechanism→root_cause and
      suggested_fix→remediation.
