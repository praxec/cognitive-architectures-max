# capabilities/cap.plan.ux-matrix.yaml
#
# GROUND + PLAN the SURFACE×PRINCIPLE analysis matrix for flow.ux.optimize.
# The agent resolves each declared surface against the ACTUAL repo (paths,
# entry points) and the persona's JTBD spine, then emits a cpm-planner-
# schedulable PlanGraph whose deliverables are the matrix CELLS (one per
# surface × principle, 7 principles).
#
# Why a cap (not an in-flow agent leaf): V13 — a flow's slot table only
# types slots written by `inputs:` or a child's `use.outputs`, so the graph
# must come out of a snippet-typed capability for cap.coordinate.cpm-plan's
# `use.inputs` to consume it (same rationale as cognitive/cap.plan.build-graph
# and cap.coordinate.acquire-cohort).
#
# Distinct from cognitive/cap.plan.build-graph on purpose: that cap's
# contract is a CODE DevelopmentPlan (file-disjoint owned_files, acceptance
# criteria, risk/blast_radius). These cells are ANALYSIS deliverables — no
# code files are owned; owned_files carries synthetic per-cell tokens purely
# to satisfy cpm-planner's disjointness invariant.
#
# Cognitive verb `plan` → V6 allows kind: noop (agent submits; output lifts).

workflows:
  cap.plan.ux-matrix:
    verb: plan
    lifecycle: experimental
    description: >
      Ground the declared surfaces in the repo + persona JTBD, then emit the
      SURFACE×PRINCIPLE matrix as a cpm-planner-schedulable PlanGraph: one
      deliverable per cell, metadata {surface, principle}, synthetic
      owned_files tokens (disjoint by construction), no prerequisites (cells
      are independent; the driver serializes via acquire). Also emits the
      grounded surface objects and the cell count.
    snippet:
      inputs:
        surfaces: { type: array,  required: true }
        persona:  { type: object, required: true }
      outputs:
        graph:             { type: object }
        grounded_surfaces: { type: array }
        cell_count:        { type: integer }
    initialState: grounding
    states:
      grounding:
        goal: >
          GROUND the surfaces — nothing else. Read $.workflow.input.surfaces
          (surface ids — repo-relative UI paths or route ids) and
          $.workflow.input.persona (id, mental_model, jtbd_spine,
          ancillary_journeys). For EACH surface id, look at the REAL repo:
          resolve it into a grounded surface object { id, paths (the
          repo-relative files that render it), entry (how the persona
          reaches it), notes (which jtbd_spine / ancillary_journey steps
          touch it) }. Never invent paths — if a surface id cannot be
          located, keep it with paths: [] and say so in notes. Submit ONLY
          grounded_surfaces; the matrix graph is expanded deterministically
          by the next step (do NOT emit deliverables or counts — a prior
          version asked for the full graph in one emission and the
          generation blew the per-call timeout every attempt).
        transitions:
          submit_surfaces:
            target: expanding
            actor: agent
            inputSchema:
              type: object
              required: [grounded_surfaces]
              properties:
                grounded_surfaces:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [id]
                    properties:
                      id:    { type: string }
                      paths: { type: array, items: { type: string } }
                      entry: { type: string }
                      notes: { type: string }
            executor: { kind: noop }
            output:
              grounded_surfaces: "$.arguments.grounded_surfaces"

      # Deterministic: the matrix is a pure cross product — no model decides it.
      expanding:
        transitions:
          expand:
            target: done
            actor: deterministic
            executor:
              kind: script
              subject: run.ux-matrix-expand
              args:
                - "$.context.grounded_surfaces"
            output:
              graph:      "$.output.json.graph"
              cell_count: "$.output.json.cell_count"
      done: { terminal: true }
